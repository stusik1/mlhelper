<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0e1320">
  <title>ML Counter Helper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>⚔️ ML Counter Helper</h1>
    <p class="sub">Type the enemy hero → see who counters them + the build</p>
  </header>

  <main>
    <div id="search-bar">
      <input id="search" type="text" inputmode="search" placeholder="🔍  Search enemy hero…" autocomplete="off">
    </div>
    <div id="filters"></div>
    <div id="content"></div>
  </main>

  <footer>
    <span id="updated"></span>
    <p class="disclaimer">Counters are general guidance for laning/draft. Builds refresh automatically once the daily updater is connected.</p>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
