<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0e1320">
  <title>ML Counter Helper</title>
  <link rel="stylesheet" href="style.css?v=5">
</head>
<body>
  <header>
    <h1>⚔️ ML Counter Helper</h1>
  </header>

  <!-- Tab bar -->
  <nav class="tabs">
    <button id="tab-matchup" class="tab active">🎯 Matchup</button>
    <button id="tab-counter" class="tab">🔍 Counters</button>
    <button id="tab-bestpick" class="tab">⚡ Best Pick</button>
  </nav>

  <main>

    <!-- ══════════════════════════════════════════════
         VIEW A — MATCHUP BUILD (pick me → pick enemy → result)
    ═══════════════════════════════════════════════ -->
    <div id="view-matchup">

      <!-- Step 1: Pick YOUR hero -->
      <div id="step1">
        <div class="step-header">
          <span class="step-num">1</span>
          <span class="step-title">Who are <strong>YOU</strong> playing?</span>
        </div>
        <div id="search-bar-me" class="search-bar">
          <input id="search-me" type="text" inputmode="search"
                 placeholder="🔍  Search your hero…" autocomplete="off">
        </div>
        <div id="filters-me" class="filters"></div>
        <div id="grid-me"></div>
      </div>

      <!-- Step 2: Pick ENEMY hero -->
      <div id="step2" hidden>
        <div class="step-header">
          <button id="btn-back1" class="back-inline">← Back</button>
          <span class="step-num">2</span>
          <span class="step-title">You picked <span id="me-label"></span> — now who is your <strong>lane enemy</strong>?</span>
        </div>
        <div class="search-bar">
          <input id="search-enemy" type="text" inputmode="search"
                 placeholder="🔍  Search enemy hero…" autocomplete="off">
        </div>
        <div id="filters-enemy" class="filters"></div>
        <div id="grid-enemy"></div>
      </div>

      <!-- Step 3: Matchup result -->
      <div id="step3" hidden>
        <button id="btn-back2" class="back">← Pick different heroes</button>
        <div id="matchup-result"></div>
      </div>

    </div>

    <!-- ══════════════════════════════════════════════
         VIEW B — COUNTER FINDER (tap enemy → see who counters them)
    ═══════════════════════════════════════════════ -->
    <div id="view-counter" hidden>
      <p class="view-sub">Tap an enemy hero to see who counters them.</p>
      <div class="search-bar">
        <input id="search-counter" type="text" inputmode="search"
               placeholder="🔍  Search enemy hero…" autocomplete="off">
      </div>
      <div id="filters-counter" class="filters"></div>
      <div id="counter-content"></div>
    </div>

    <!-- ══════════════════════════════════════════════
         VIEW C — BEST PICK (enemy picked → who should I play?)
    ═══════════════════════════════════════════════ -->
    <div id="view-bestpick" hidden>

      <!-- Step 1: pick the enemy hero -->
      <div id="bp-step1">
        <p class="view-sub">Who did the enemy pick? Select their hero below.</p>
        <div class="search-bar">
          <input id="search-bp" type="text" inputmode="search"
                 placeholder="🔍  Search enemy hero…" autocomplete="off">
        </div>
        <div id="filters-bp" class="filters"></div>
        <div id="grid-bp"></div>
      </div>

      <!-- Step 2: recommended counter picks -->
      <div id="bp-step2" hidden>
        <div id="bp-recommendations"></div>
      </div>

      <!-- Step 3: full matchup build for chosen counter vs enemy -->
      <div id="bp-step3" hidden>
        <div id="bp-matchup"></div>
      </div>

    </div>

  </main>

  <footer>
    <span id="updated"></span>
    <p class="disclaimer">Builds are general guidance — skill and teamwork decide the match.</p>
  </footer>

  <script src="data.js?v=5"></script>
  <script src="item_images.js?v=5"></script>
  <script src="hero_images.js?v=5"></script>
  <script src="app.js?v=5"></script>
</body>
</html>
